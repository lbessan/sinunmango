<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>sinunmango – Prototipo</title>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script type="text/babel" src="ios-frame.jsx"></script>
  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; background: #0f1117; overflow: hidden; }
    body { display: flex; align-items: center; justify-content: center; }
    #root { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; }
  </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="sinunmango-app.jsx"></script>

<script type="text/babel">
const { useState, useEffect } = React;

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "mode": "oscuro",
  "accent": "naranja",
  "darkDevice": false
}/*EDITMODE-END*/;

function Root() {
  const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULTS);

  const bgColors = {
    claro:  { verde:'#D4E8E4', azul:'#D8E4F4', violeta:'#E4DCF4', naranja:'#F4E4D8', rosado:'#F4D8E8' },
    oscuro: '#050B12',
  };

  const pageBg = tweaks.mode === 'oscuro'
    ? bgColors.oscuro
    : (bgColors.claro[tweaks.accent] || '#D8E4F4');

  const handleThemeChange = (mode, accent) => {
    setTweak({ mode, accent });
  };

  return (
    <div style={{ width:'100%', height:'100%', background: pageBg, display:'flex', alignItems:'center', justifyContent:'center', transition:'background 0.5s ease' }}>
      <IOSDevice dark={tweaks.darkDevice}>
        <SinunmangoApp
          initialMode={tweaks.mode}
          initialAccent={tweaks.accent}
          onThemeChange={handleThemeChange}
        />
      </IOSDevice>

      <TweaksPanel title="Tweaks">
        <TweakSection label="Modo">
          <TweakRadio
            id="mode"
            options={[
              { value: 'claro',  label: 'Claro'  },
              { value: 'oscuro', label: 'Oscuro' },
            ]}
            value={tweaks.mode}
            onChange={v => setTweak('mode', v)}
          />
        </TweakSection>
        <TweakSection label="Color de acento">
          <TweakRadio
            id="accent"
            options={[
              { value: 'verde',   label: 'Verde'   },
              { value: 'azul',    label: 'Azul'    },
              { value: 'violeta', label: 'Violeta' },
              { value: 'naranja', label: 'Naranja' },
              { value: 'rosado',  label: 'Rosado'  },
            ]}
            value={tweaks.accent}
            onChange={v => setTweak('accent', v)}
          />
        </TweakSection>
        <TweakSection label="Marco del dispositivo">
          <TweakToggle
            id="darkDevice"
            label="Negro"
            value={tweaks.darkDevice}
            onChange={v => setTweak('darkDevice', v)}
          />
        </TweakSection>
      </TweaksPanel>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<Root />);
</script>
</body>
</html>
