name: Build Android (mobile)

# Cuándo se dispara este workflow:
#   - Manualmente desde la UI de GitHub (botón "Run workflow" en la pestaña Actions)
#   - Automáticamente cuando se pushea a main y hay cambios en sinunmango-mobile/
#
# Corre `eas build --local` en un runner gratuito de GitHub. NO consume cuota
# del plan free de EAS porque el cómputo es local del runner. La keystore para
# firmar el AAB se baja desde EAS usando EXPO_TOKEN (no hay que tenerla local).
#
# Auto-bump: antes del build, el workflow incrementa android.versionCode en
# app.json y commitea el cambio (con [skip ci] para no dispararse a sí mismo).
# Así Play Console nunca te rebota por "versionCode ya usado".

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'sinunmango-mobile/**'
      - '.github/workflows/build-mobile.yml'

# Permiso necesario para que el workflow pueda commitear el bump del versionCode
permissions:
  contents: write

jobs:
  build:
    name: EAS local build (Android)
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          # Necesario para poder pushear el bump del versionCode al final
          ref: ${{ github.ref_name }}
          persist-credentials: true
          fetch-depth: 1

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: sinunmango-mobile/package-lock.json

      - name: Setup Java 17 (Temurin)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Expo + EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        working-directory: sinunmango-mobile
        run: npm ci

      - name: Bump versionCode (in-place, antes del build)
        id: bump
        working-directory: sinunmango-mobile
        run: |
          CURRENT=$(jq '.expo.android.versionCode' app.json)
          NEW=$((CURRENT + 1))
          jq ".expo.android.versionCode = $NEW" app.json > app.json.tmp && mv app.json.tmp app.json
          echo "new_version=$NEW" >> "$GITHUB_OUTPUT"
          echo "::notice::versionCode bumped: $CURRENT → $NEW"

      - name: Build Android AAB (local)
        working-directory: sinunmango-mobile
        run: eas build --platform android --profile production --local --non-interactive --output ./app-release.aab

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: sinunmango-android-aab-v${{ steps.bump.outputs.new_version }}
          path: sinunmango-mobile/app-release.aab
          retention-days: 14

      - name: Commit versionCode bump
        if: success()
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add sinunmango-mobile/app.json
          if git diff --cached --quiet; then
            echo "Nada para committear (versionCode ya estaba sincronizado)"
            exit 0
          fi
          git commit -m "ci: bump versionCode to ${{ steps.bump.outputs.new_version }} [skip ci]"
          # Retry con rebase si main tuvo commits nuevos mientras corría el build.
          # Esto pasa cuando el dev pushea código durante los ~15 min del build.
          # El bump no es crítico (el AAB ya está en artifacts), así que si no
          # podemos pushear después de 5 intentos, salimos con warning sin fail.
          for i in 1 2 3 4 5; do
            if git push; then
              echo "Push exitoso en intento $i"
              exit 0
            fi
            echo "Push rechazado en intento $i, sincronizando con remote..."
            git pull --rebase origin "${{ github.ref_name }}" || true
            sleep 2
          done
          echo "::warning::No se pudo pushear el bump de versionCode tras 5 intentos. El AAB se generó OK (artifact); bumpear manualmente el versionCode en app.json o re-correr el workflow para resincronizar."
          exit 0

      - name: Done
        run: |
          echo "::notice::Build OK. AAB versionCode=${{ steps.bump.outputs.new_version }}. Bajalo del artifact 'sinunmango-android-aab-v${{ steps.bump.outputs.new_version }}'."
